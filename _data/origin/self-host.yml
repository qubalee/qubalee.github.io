# =====================================================================
# Local self-hosted asset map for Chirpy
# =====================================================================
type: self_host

self_host:
  webfonts: /assets/css/webfonts.css

  fontawesome:
    css: /assets/lib/fontawesome-free/css/all.min.css

  bootstrap:
    css: /assets/lib/bootstrap/css/bootstrap.min.css
    js: /assets/lib/bootstrap/js/bootstrap.bundle.min.js

  glightbox:
    css: /assets/lib/glightbox/css/glightbox.min.css

  toc:
    css: /assets/lib/tocbot/tocbot.css

  mermaid:
    js: /assets/lib/mermaid/mermaid.min.js

  mathjax:
    js: /assets/lib/mathjax/tex-mml-chtml.js

  simple-jekyll-search:
    js: /assets/lib/simple-jekyll-search/simple-jekyll-search.min.js

  clipboard:
    js: /assets/lib/clipboard/clipboard.min.js

  dayjs:
    js: /assets/lib/dayjs/dayjs.min.js
    plugin:
      localizedFormat: /assets/lib/dayjs/plugin/localizedFormat.js
      relativeTime: /assets/lib/dayjs/plugin/relativeTime.js
    locale:
      en: /assets/lib/dayjs/locale/en.js
